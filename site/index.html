<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#121212" />
    <meta
      name="description"
      content="Klarow — automatyzacja, upraszczanie i porządek w danych dla firm 20–250 osób, które wyrosły na Excelu. Działające demo narzędzi kontrolingu, importów i płatności. Wdrożenie w dni, nie w miesiące. Dane zostają u Ciebie."
    />
    <meta property="og:site_name" content="Klarow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Klarow — automatyzacja danych i narzędzia kontrolingu. Wdrożenie w dni." />
    <meta
      property="og:description"
      content="Działające demo narzędzi: raport zarządczy, kontroling kosztów, audyt jakości danych, importy ERP, płatności. On-premise — dane zostają u Ciebie."
    />
    <meta property="og:url" content="https://klarow.com/" />
    <meta property="og:image" content="https://klarow.com/klarow-logo-512.png" />
    <link rel="canonical" href="https://klarow.com/" />
    <!-- ?v=2 — przeglądarki agresywnie cache'ują favicony; buster wymusza świeżą ikonę -->
    <link rel="icon" href="/favicon.ico?v=2" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=2" />
    <title>Klarow — automatyzacja danych. Wdrożenie w dni, nie w miesiące.</title>
    <script>
      /* Samonaprawa po nieaktualnym cache (objaw: "strona tylko z tłem" /
         pusta na telefonie): stary index.html z cache woła zahashowane
         assety, których po nowym deployu już nie ma. Gdy skrypt lub arkusz
         się nie załaduje — JEDNORAZOWO przeładuj stronę, omijając cache
         (nagłówki wymuszą pobranie świeżego HTML). */
      window.addEventListener(
        "error",
        function (e) {
          var t = e.target;
          if (!t || (t.tagName !== "SCRIPT" && t.tagName !== "LINK")) return;
          try {
            if (sessionStorage.getItem("kl-cache-heal")) return;
            sessionStorage.setItem("kl-cache-heal", "1");
          } catch (_) {}
          location.reload();
        },
        true
      );

      /* Tryb diagnostyczny: klarow.com/?debug=1 — wypisuje na ekranie błędy JS
         i stan strony (działa nawet, gdy React nie wstanie). Do zdalnej
         diagnozy "strony tylko z tłem" na telefonach. Czysty ES5. */
      if (location.search.indexOf("debug") !== -1) {
        (function () {
          var box = document.createElement("div");
          box.style.cssText =
            "position:fixed;left:0;top:0;right:0;max-height:70vh;overflow:auto;" +
            "background:#ffffff;color:#111111;font:11px/1.5 monospace;z-index:2147483647;" +
            "padding:10px;white-space:pre-wrap;border-bottom:3px solid #a8b4c2";
          var buf = [];
          function log(m) {
            buf.push(m);
            box.textContent = buf.join("\n");
          }
          function mount() {
            if (document.body && !box.parentNode) document.body.appendChild(box);
          }
          document.addEventListener("DOMContentLoaded", mount);
          setTimeout(mount, 500);
          log("KLAROW DEBUG");
          log("UA: " + navigator.userAgent);
          log("viewport: " + window.innerWidth + "x" + window.innerHeight + " dpr=" + (window.devicePixelRatio || "?"));
          window.addEventListener(
            "error",
            function (e) {
              var t = e.target;
              if (t && (t.tagName === "SCRIPT" || t.tagName === "LINK")) {
                log("ASSET ERR: " + (t.src || t.href));
              } else {
                log("JS ERR: " + (e.message || "?") + " @ " + (e.filename || "?") + ":" + (e.lineno || "?"));
              }
            },
            true
          );
          window.addEventListener("unhandledrejection", function (e) {
            log("PROMISE ERR: " + (e.reason && e.reason.message ? e.reason.message : e.reason));
          });
          function snapshot(tag) {
            try {
              var root = document.getElementById("root");
              log("--- " + tag + " ---");
              log("root dzieci: " + (root ? root.children.length : "BRAK #root"));
              var deck = document.querySelector(".deck");
              if (deck) {
                var dc = getComputedStyle(deck);
                log(".deck: pos=" + dc.position + " " + deck.offsetWidth + "x" + deck.offsetHeight + " z=" + dc.zIndex + " top=" + dc.top);
              } else {
                log(".deck: BRAK");
              }
              var slide = document.querySelector(".slide.active");
              if (slide) {
                var sc = getComputedStyle(slide);
                log(
                  ".slide.active: vis=" + sc.visibility + " op=" + sc.opacity +
                  " " + slide.offsetWidth + "x" + slide.offsetHeight + " transform=" + sc.transform
                );
              } else {
                log(".slide.active: BRAK");
              }
              var nav = document.querySelector("header");
              log("navbar: " + (nav ? nav.offsetWidth + "x" + nav.offsetHeight : "BRAK"));
              if (window.CSS && CSS.supports) {
                log(
                  "CSS inset: " + CSS.supports("inset", "0") +
                  " · @layer: " + (typeof window.CSSLayerBlockRule !== "undefined") +
                  " · @property: " + (typeof window.CSSPropertyRule !== "undefined") +
                  " · dvh: " + CSS.supports("height", "100dvh")
                );
              }
              /* WebGL: Lockdown Mode / limit kontekstów wyłącza tło 3D —
                 od 2026-07-23 strona MA to przeżyć (BgBoundary); sonda mówi,
                 czy na tym urządzeniu tło w ogóle ma prawo działać */
              try {
                var pc = document.createElement("canvas");
                var g2 = pc.getContext("webgl2");
                var g1 = g2 || pc.getContext("webgl");
                log("WebGL2: " + !!g2 + " · WebGL: " + !!g1 +
                  " · canvas tła: " + !!document.querySelector(".bg-layer canvas"));
              } catch (e2) {
                log("WebGL probe err: " + e2.message);
              }
            } catch (err) {
              log("snapshot err: " + err.message);
            }
          }
          setTimeout(function () { snapshot("po 2s"); }, 2000);
          setTimeout(function () { snapshot("po 6s"); }, 6000);
        })();
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
